<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord chat</title>

    <link rel="stylesheet" href="./css/index.css">
</head>

<body>
    <div class="wrapper d-flex">
        <div class="wrapper-body d-flex">
            <div class="server-list">
                <ul class="d-flex">
                    <li class="server">
                        <button type="button"><img src="./img/logo.webp" alt=""></button>
                    </li>
                    <li class="server">
                        <button type="button"><img src="./img/server arte.png" alt=""></button>
                    </li>
                    <li class="server">
                        <button type="button"><img src="./img/server_boolean.png" alt=""></button>
                    </li>
                    <li class="server">
                        <button type="button"><img src="./img/server_italia.png" alt=""></button>
                    </li>
                    <li class="server">
                        <button type="button"><img src="./img/server_nintendo.png" alt=""></button>
                    </li>
                    <li class="server">
                        <button type="button"><img src="./img/server_javascript.png" alt=""></button>
                    </li>
                    <li class="server">
                        <button type="button"><img src="./img/server_pokemon.png" alt=""></button>
                    </li>
                </ul>
            </div>
            <div class="wrapper-chats d-flex">
                <header class="header-chats">
                    <h1 class="messaggi">Messaggi</h1>
                    <div class="cerca-amici">
                        <button type="button"><i class="bi bi-search"></i></button>
                        <button type="button"><i class="bi bi-person-fill-add"></i>Aggiungi amici</button>
                    </div>
                </header>
                <main class="body-chats">
                    <ul>
                        <li class="chat">
                            <img src="./img/profile1.webp" alt="">
                            <h4 class="nome-utente"></h4>
                            <p class="messaggio"></p>
                        </li>
                        <li class="chat">
                            <img src="./img/profile2.webp" alt="">
                            <h4 class="nome-utente"></h4>
                            <p class="messaggio"></p>
                        </li>
                        <li class="chat">
                            <img src="./img/profile12.webp" alt="">
                            <h4 class="nome-utente"></h4>
                            <p class="messaggio"></p>
                        </li>
                        <li class="chat">
                            <img src="./img/profile3.webp" alt="">
                            <h4 class="nome-utente"></h4>
                            <p class="messaggio"></p>
                        </li>
                        <li class="chat">
                            <img src="./img/profile4.webp" alt="">
                            <h4 class="nome-utente"></h4>
                            <p class="messaggio"></p>
                        </li>
                        <li class="chat">
                            <img src="./img/profile5.webp" alt="">
                            <h4 class="nome-utente"></h4>
                            <p class="messaggio"></p>
                        </li>
                        <li class="chat">
                            <img src="./img/profile6.webp" alt="">
                            <h4 class="nome-utente"></h4>
                            <p class="messaggio"></p>
                        </li>
                        <li class="chat">
                            <img src="./img/profile7.webp" alt="">
                            <h4 class="nome-utente"></h4>
                            <p class="messaggio"></p>
                        <li class="chat">
                            <img src="./img/profile8.webp" alt="">
                            <h4 class="nome-utente"></h4>
                            <p class="messaggio"></p>
                        </li>
                    </ul>
                </main>
            </div>
        </div>
        <footer>
            <div class="footer-nav d-flex">
                <button type="button">
                    <i class="bi bi-houses-fill"></i>
                    <p>Pagina principale</p>
                </button>
                <button type="button">
                    <i class="bi bi-bell-fill"></i>
                    <p>Notifiche</p>
                </button>
                <button type="button">
                    <p>Tu</p>
                </button>

            </div>
        </footer>
    </div>

</body>

</html>
